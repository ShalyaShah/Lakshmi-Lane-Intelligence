services:
  - type: web
    name: lakshmi-lane-intelligence
    env: docker
    plan: free
    region: oregon
    envVars:
      - key: DB_PATH
        value: /tmp/logistics.db
      - key: PORT
        value: 3000
      - key: GEMINI_API_KEY
        sync: false # You will need to add this manually in the Render dashboard
